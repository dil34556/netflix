name: Build Netflix Apps

on:
  push:
    branches: [ main ]
    tags: [ 'v*' ]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-macos:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v5
      
      - name: Install XcodeGen
        run: brew install xcodegen
        
      - name: Generate Xcode Project
        run: xcodegen generate

      - name: Run macOS Tests
        run: |
          xcodebuild -project Netflix.xcodeproj \
                     -scheme Netflix \
                     -destination 'platform=macOS' \
                     CODE_SIGNING_ALLOWED=NO \
                     test
        
      - name: Build macOS App
        run: |
          xcodebuild -project Netflix.xcodeproj \
                     -scheme Netflix \
                     -configuration Release \
                     -derivedDataPath build \
                     ARCHS="arm64 x86_64" \
                     ONLY_ACTIVE_ARCH=NO \
                     CODE_SIGNING_ALLOWED=NO
                     
      - name: Manual Ad-Hoc Sign
        run: |
          APP_PATH="build/Build/Products/Release/Netflix.app"
          ENTITLEMENTS="Netflix/Netflix/Netflix.entitlements"
          
          # Force sign everything deeply with ad-hoc identity
          codesign --force --deep --sign - --entitlements "$ENTITLEMENTS" --options runtime "$APP_PATH"
          
      - name: Package as DMG
        run: |
          mkdir -p dist
          cp -R build/Build/Products/Release/Netflix.app dist/
          hdiutil create -volname "Netflix" -srcfolder dist -ov -format UDZO Netflix.dmg
          
      - name: Upload Mac Artifact
        uses: actions/upload-artifact@v4
        with:
          name: Netflix-Mac-DMG
          path: Netflix.dmg

      - name: Publish Mac Release
        if: startsWith(github.ref, 'refs/tags/v')
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release view "$GITHUB_REF_NAME" >/dev/null 2>&1 || \
            gh release create "$GITHUB_REF_NAME" \
              --repo "$GITHUB_REPOSITORY" \
              --title "Netflix $GITHUB_REF_NAME" \
              --notes "Download Netflix.dmg, open it, and drag Netflix.app to Applications."

          gh release upload "$GITHUB_REF_NAME" Netflix.dmg \
            --repo "$GITHUB_REPOSITORY" \
            --clobber

  build-linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          
      - name: Install dependencies
        run: |
          pip install pyinstaller PyQt6 PyQt6-WebEngine
          
      - name: Build Linux Binary
        run: |
          cd netflix-linux
          pyinstaller --onefile --windowed --name Netflix-Linux netflix_app.py
          
      - name: Upload Linux Artifact
        uses: actions/upload-artifact@v4
        with:
          name: Netflix-Linux
          path: netflix-linux/dist/Netflix-Linux

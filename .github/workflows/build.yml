name: Build Netflix Apps

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build-macos:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v5
      
      - name: Install XcodeGen
        run: brew install xcodegen
        
      - name: Generate Xcode Project
        run: xcodegen generate

      - name: Run macOS Tests
        run: |
          xcodebuild -project Netflix.xcodeproj \
                     -scheme Netflix \
                     -destination 'platform=macOS' \
                     CODE_SIGNING_ALLOWED=NO \
                     test
        
      - name: Build macOS App
        run: |
          xcodebuild -project Netflix.xcodeproj \
                     -scheme Netflix \
                     -configuration Release \
                     -derivedDataPath build \
                     ARCHS="arm64 x86_64" \
                     ONLY_ACTIVE_ARCH=NO \
                     CODE_SIGNING_ALLOWED=NO
                     
      - name: Manual Ad-Hoc Sign
        run: |
          APP_PATH="build/Build/Products/Release/Netflix.app"
          ENTITLEMENTS="Netflix/Netflix/Netflix.entitlements"
          
          # Force sign everything deeply with ad-hoc identity
          codesign --force --deep --sign - --entitlements "$ENTITLEMENTS" --options runtime "$APP_PATH"
          
      - name: Package as DMG
        run: |
          mkdir -p dist
          cp -R build/Build/Products/Release/Netflix.app dist/
          hdiutil create -volname "Netflix" -srcfolder dist -ov -format UDZO Netflix.dmg
          
      - name: Upload Mac Artifact
        uses: actions/upload-artifact@v4
        with:
          name: Netflix-Mac-DMG
          path: Netflix.dmg

  build-linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          
      - name: Install dependencies
        run: |
          pip install pyinstaller PyQt6 PyQt6-WebEngine
          
      - name: Build Linux Binary
        run: |
          cd netflix-linux
          pyinstaller --onefile --windowed --name Netflix-Linux netflix_app.py
          
      - name: Upload Linux Artifact
        uses: actions/upload-artifact@v4
        with:
          name: Netflix-Linux
          path: netflix-linux/dist/Netflix-Linux

name: Build Netflix Apps

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build-macos:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Install XcodeGen
        run: brew install xcodegen
        
      - name: Generate Xcode Project
        run: xcodegen generate
        
      - name: Build macOS App
        run: |
          xcodebuild -project Netflix.xcodeproj \
                     -scheme Netflix \
                     -configuration Release \
                     -derivedDataPath build \
                     CODE_SIGN_IDENTITY="-" \
                     CODE_SIGNING_REQUIRED=NO \
                     CODE_SIGNING_ALLOWED=YES
                     
      - name: Package as DMG
        run: |
          mkdir -p dist
          cp -R build/Build/Products/Release/Netflix.app dist/
          hdiutil create -volname "Netflix" -srcfolder dist -ov -format UDZO Netflix.dmg
          
      - name: Upload Mac Artifact
        uses: actions/upload-artifact@v4
        with:
          name: Netflix-Mac-DMG
          path: Netflix.dmg

  build-linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          
      - name: Install dependencies
        run: |
          pip install pyinstaller PyQt6 PyQt6-WebEngine
          
      - name: Build Linux Binary
        run: |
          cd netflix-linux
          pyinstaller --onefile --windowed --name Netflix-Linux netflix_app.py
          
      - name: Upload Linux Artifact
        uses: actions/upload-artifact@v4
        with:
          name: Netflix-Linux
          path: netflix-linux/dist/Netflix-Linux
